name: tag release

# Auto-tag main with an incremented semver patch so that
# `go install github.com/dlants/pkb/cmd/pkb@latest` always resolves to the
# latest code on main. Runs after code lands; tag pushes don't trigger this
# workflow (push tag events are filtered out by the branches filter), and the
# pkb-index reindex commit is skipped via paths-ignore.
on:
  push:
    branches: [main]
    paths-ignore:
      - pkb.db
      - pkb-state.toml

concurrency:
  group: tag-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Compute and push next tag
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver=${latest#v}
            major=${ver%%.*}
            rest=${ver#*.}
            minor=${rest%%.*}
            patch=${rest#*.}
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tagging $next"
          git tag "$next"
          git push origin "$next"
