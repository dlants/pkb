maxReindexCost = 5.0

[embedding]
provider = "voyage"
model = "voyage-context-4"
dimensions = 256
apikeyenv = "VOYAGE_API_KEY"
contextualizeText = true

# Text is embedded via voyage-context-4's contextualized endpoint
# (contextualizeText above), which supplies document context directly, and code
# is never augmented -- so no LLM augmentation is used.
[inference]
provider = "none"
